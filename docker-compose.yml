version: '3.3'

services:
  kingwangjjang-crawl:
    image: ${DOCKERHUB_USERNAME}/crawl_scheduler:0.0.1
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:?DOCKER_DATABASE_URL is required}
      # The API/image server reads this same host directory via /app/public.
      # Override the local-development ROOT=./media value from .env so files
      # survive crawler container replacement and are visible to the server.
      ROOT: /app/public
    volumes:
      - ${CRAWLER_MEDIA_HOST_ROOT:-/mnt/kingwangjjang}:/app/public
    networks:
      - kingwangjjang-network

networks:
  kingwangjjang-network:
    external: true
