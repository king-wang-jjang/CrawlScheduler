services:
  kingwangjjang-crawl:
    image: ${DOCKERHUB_USERNAME}/crawl_scheduler:0.0.1
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:?DOCKER_DATABASE_URL is required}
    volumes:
      - /mnt/kingwangjjang:/app/public
    networks:
      - kingwangjjang-network

networks:
  kingwangjjang-network:
    external: true
